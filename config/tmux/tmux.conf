# ~/.config/tmux/tmux.conf

# ── Core ────────────────────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",*:Tc"                  # kitty true color
set -sg escape-time 0                               # no delay for neovim
set -g focus-events on                              # neovim autoread works
set -g mouse on                                     # mouse support
set -g base-index 1                                 # windows start at 1
set -g pane-base-index 1                            # panes start at 1
set -g renumber-windows on                          # fill gaps when closing
set -g history-limit 10000

# ── Prefix ──────────────────────────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Keybindings ─────────────────────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded!"

# splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# new window in current path
bind c new-window -c "#{pane_current_path}"

# vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Copy mode (vim keys) ─────────────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Theme ───────────────────────────────────────────────────────────────────
set -g status-position top
set -g status-justify centre
set -g status-interval 2
set -g status-style "bg=default,fg=#a9b1d6"

# left: session name
set -g status-left-length 40
set -g status-left ""

# right: date + time
set -g status-right-length 60
set -g status-right ""

# windows
set -g window-status-format "#[fg=#565f89] #W "
set -g window-status-current-format "#[bg=#2a2a3e,fg=#7aa2f7,bold] #W #[bg=#1a1a2e,fg=#2a2a3e]"

# pane borders
set -g pane-border-style "fg=#2a2a3e,bg=default"
set -g pane-active-border-style "fg=#7aa2f7,bg=default"

# message bar
set -g message-style "bg=#7aa2f7,fg=#1a1a2e,bold"
